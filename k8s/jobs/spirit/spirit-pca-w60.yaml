apiVersion: batch/v1
kind: Job
metadata:
  name: logexp-logpurifier-job-spirit-pca-w60
  namespace: logexp
  labels:
    app: logexp-logpurifier
    component: experiment
    dataset: spirit
    model: pca
    window: "w60"
spec:
  activeDeadlineSeconds: 86400  # 24 hours
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: logexp-logpurifier
        component: experiment
        dataset: spirit
        model: pca
        window: "w60"
    spec:
      restartPolicy: Never

      containers:
      - name: logexp-logpurifier-pod-spirit-pca-w60
        image: registry.cn-shanghai.aliyuncs.com/holgercloud/logexp-logpurifier:v0.1.1
        args:
          - "--dataset"
          - "Spirit"
          - "--window"
          - "60"
          - "--models"
          - "PCA"
          - "--artifacts"
          - "/app/artifacts"
          - "--run-id"
          - "spirit-pca-w60"
          - "--log-level"
          - "DEBUG"

        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"

        volumeMounts:
        - name: data
          mountPath: /app/data
          readOnly: true
        - name: artifacts
          mountPath: /app/artifacts
        - name: logs
          mountPath: /app/logs

        env:
        - name: PYTHONUNBUFFERED
          value: "1"

      volumes:
      - name: data
        hostPath:
          path: /nas/LAD/Dataset
          type: Directory
      - name: artifacts
        hostPath:
          path: /nas/logexp-data/reproduction-logpurifier/artifacts
          type: DirectoryOrCreate
      - name: logs
        hostPath:
          path: /nas/logexp-data/reproduction-logpurifier/logs
          type: DirectoryOrCreate
